services:
  # Backend API Service
  - type: web
    name: inteligencia-comercial-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGIN
        value: "*"
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: inteligencia-comercial-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: echo "No build needed - static HTML"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: inteligencia-comercial-api
          envVarKey: RENDER_EXTERNAL_URL
