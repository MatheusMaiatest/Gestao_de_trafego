<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Inteligência Comercial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        input, select, button {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .business-unit-toggle {
            display: flex;
            gap: 10px;
        }

        .business-unit-toggle button {
            flex: 1;
        }

        .business-unit-toggle button.active {
            background: #764ba2;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .clients-table {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #ff5252;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Plataforma de Inteligência Comercial</h1>
            
            <div class="filters">
                <div class="filter-group">
                    <label>Data Início:</label>
                    <input type="date" id="startDate">
                </div>
                
                <div class="filter-group">
                    <label>Data Fim:</label>
                    <input type="date" id="endDate">
                </div>
                
                <div class="filter-group">
                    <label>Unidade de Negócio:</label>
                    <div class="business-unit-toggle">
                        <button onclick="setBusinessUnit('all')" class="active" id="btn-all">Todos</button>
                        <button onclick="setBusinessUnit('ecommerce')" id="btn-ecommerce">E-commerce</button>
                        <button onclick="setBusinessUnit('distributor')" id="btn-distributor">Distribuidor</button>
                    </div>
                </div>
                
                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button onclick="loadData()">🔍 Buscar</button>
                </div>
            </div>
        </header>

        <div id="loading" class="loading" style="display: none;">
            Carregando dados...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="dashboard" id="dashboard"></div>

        <div class="clients-table" id="clientsTable" style="display: none;">
            <h2 style="margin-bottom: 20px;">Lista de Clientes</h2>
            <table id="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>WhatsApp</th>
                        <th>Cidade</th>
                        <th>Estado</th>
                        <th>Total Pedidos</th>
                        <th>Total Gasto</th>
                        <th>Ticket Médio</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // Detecta automaticamente a URL da API
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3001/api'
            : 'https://inteligencia-comercial-api.onrender.com/api';
        
        let currentBusinessUnit = 'all';
        let currentPage = 1;

        // Set default dates (last 30 days)
        const today = new Date();
        const thirtyDaysAgo = new Date(today);
        thirtyDaysAgo.setDate(today.getDate() - 30);

        document.getElementById('endDate').valueAsDate = today;
        document.getElementById('startDate').valueAsDate = thirtyDaysAgo;

        function setBusinessUnit(unit) {
            currentBusinessUnit = unit;
            
            // Update button styles
            document.querySelectorAll('.business-unit-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn-${unit}`).classList.add('active');
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleDateString('pt-BR');
        }

        async function loadData() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                showError('Por favor, selecione as datas');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('dashboard').innerHTML = '';
            document.getElementById('clientsTable').style.display = 'none';

            try {
                // Load KPIs
                const kpisResponse = await fetch(
                    `${API_URL}/dashboard/kpis?startDate=${startDate}&endDate=${endDate}&businessUnit=${currentBusinessUnit}`
                );
                
                if (!kpisResponse.ok) {
                    throw new Error('Erro ao carregar KPIs');
                }

                const kpis = await kpisResponse.json();
                displayKPIs(kpis);

                // Load clients
                const clientsResponse = await fetch(
                    `${API_URL}/clients?startDate=${startDate}&endDate=${endDate}&businessUnit=${currentBusinessUnit}&page=${currentPage}&limit=50`
                );

                if (!clientsResponse.ok) {
                    throw new Error('Erro ao carregar clientes');
                }

                const clientsData = await clientsResponse.json();
                displayClients(clientsData);

                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError(error.message);
            }
        }

        function displayKPIs(kpis) {
            const dashboard = document.getElementById('dashboard');
            
            const kpiCards = [
                { title: 'Total de Clientes', value: kpis.totalClients.toLocaleString('pt-BR') },
                { title: 'Clientes Ativos', value: kpis.activeClients.toLocaleString('pt-BR') },
                { title: 'Clientes Inativos', value: kpis.inactiveClients.toLocaleString('pt-BR') },
                { title: 'Novos Clientes', value: kpis.newClients.toLocaleString('pt-BR') },
                { title: 'Faturamento Total', value: formatCurrency(kpis.totalRevenue) },
                { title: 'Ticket Médio', value: formatCurrency(kpis.averageTicket) },
                { title: 'Total de Pedidos', value: kpis.totalOrders.toLocaleString('pt-BR') },
                { title: 'Frequência de Compra', value: kpis.averagePurchaseFrequency.toFixed(2) }
            ];

            dashboard.innerHTML = kpiCards.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-title">${kpi.title}</div>
                    <div class="kpi-value">${kpi.value}</div>
                </div>
            `).join('');
        }

        function displayClients(data) {
            const { clients, total, page, pages } = data;
            const tableBody = document.getElementById('tableBody');
            const clientsTable = document.getElementById('clientsTable');

            clientsTable.style.display = 'block';

            tableBody.innerHTML = clients.map(client => `
                <tr>
                    <td>${client.name}</td>
                    <td>${client.email || '-'}</td>
                    <td>${client.phone || '-'}</td>
                    <td>${client.whatsapp || '-'}</td>
                    <td>${client.city || '-'}</td>
                    <td>${client.state || '-'}</td>
                    <td>${client.totalOrders}</td>
                    <td>${formatCurrency(client.totalSpent)}</td>
                    <td>${formatCurrency(client.averageTicket)}</td>
                </tr>
            `).join('');

            // Pagination
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = `
                <button onclick="changePage(${page - 1})" ${page === 1 ? 'disabled' : ''}>⬅️ Anterior</button>
                <span style="color: white; padding: 10px;">Página ${page} de ${pages}</span>
                <button onclick="changePage(${page + 1})" ${page === pages ? 'disabled' : ''}>Próxima ➡️</button>
            `;
        }

        function changePage(newPage) {
            if (newPage < 1) return;
            currentPage = newPage;
            loadData();
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
